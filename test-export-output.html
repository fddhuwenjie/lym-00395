<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Layout Preview</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .preview-wrapper {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      padding: 16px;
      min-height: 400px;
      width: 100%;
      max-width: 1200px;
    }

    .preview-item {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      min-height: 40px;
      padding: 8px 12px;
    }

    .container {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  gap: 16px;
  min-height: 200px;
}

.item {
  padding: 20px 32px;
}

  </style>
</head>
<body>
  <div class="preview-wrapper">
    <div class="container">
  <div class="item preview-item">Item 1</div>
  <div class="item preview-item">Item 2</div>
  <div class="item preview-item">Item 3</div>
</div>
  </div>
</body>
</html>
